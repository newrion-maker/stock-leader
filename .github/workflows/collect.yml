name: 주도 테마 분석 자동 배포

on:
  # 수동 실행 (GitHub 웹에서 버튼 클릭)
  workflow_dispatch:
  # 평일 장 마감 후 자동 실행 (한국시간 오후 4시 = UTC 07:00)
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pykrx requests beautifulsoup4

      - name: 데이터 수집
        run: python collect.py

      - name: data.json 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "데이터 업데이트: $(date '+%Y-%m-%d')" || echo "변경사항 없음"
          git push
