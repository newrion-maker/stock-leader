name: 주도 테마 자동 수집

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests python-dotenv pykrx-openapi

      - name: 데이터 수집 실행
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          ACCOUNT_NO: ${{ secrets.ACCOUNT_NO }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python collect.py

      - name: data.json 커밋 및 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "데이터 자동 업데이트: $(date '+%Y-%m-%d %H:%M')" || echo "변경사항 없음"
          git push
